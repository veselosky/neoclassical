{{- if .Site.Params.darkmode.enabled }}
<div class="neo-theme-toggle">
  <button 
    type="button" 
    class="neo-theme-toggle-btn btn btn-sm" 
    id="theme-toggle"
    aria-label="Toggle theme"
    title="Toggle theme">
    <svg class="neo-theme-icon neo-theme-icon-light" width="20" height="20" fill="currentColor" aria-hidden="true">
      <use href="#icon-sun"/>
    </svg>
    <svg class="neo-theme-icon neo-theme-icon-dark" width="20" height="20" fill="currentColor" aria-hidden="true">
      <use href="#icon-moon"/>
    </svg>
    <svg class="neo-theme-icon neo-theme-icon-auto" width="20" height="20" fill="currentColor" aria-hidden="true">
      <use href="#icon-circle-half"/>
    </svg>
    <span class="neo-theme-label visually-hidden" id="theme-label"></span>
  </button>
</div>

<!-- SVG sprite for theme icons -->
<svg style="display: none;" aria-hidden="true">
  <symbol id="icon-sun" viewBox="0 0 16 16">
    <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
  </symbol>
  <symbol id="icon-moon" viewBox="0 0 16 16">
    <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278zM4.858 1.311A7.269 7.269 0 0 0 1.025 7.71c0 4.02 3.279 7.276 7.319 7.276a7.316 7.316 0 0 0 5.205-2.162c-.337.042-.68.063-1.029.063-4.61 0-8.343-3.714-8.343-8.29 0-1.167.242-2.278.681-3.286z"/>
  </symbol>
  <symbol id="icon-circle-half" viewBox="0 0 16 16">
    <path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z"/>
  </symbol>
</svg>

<script>
  /**
   * Update theme toggle button UI based on current theme
   */
  window.updateThemeToggle = function(preference, effectiveTheme) {
    const button = document.getElementById('theme-toggle');
    const label = document.getElementById('theme-label');
    
    if (!button || !label) return;
    
    // Remove all active classes
    button.classList.remove('theme-light', 'theme-dark', 'theme-auto');
    
    // Add current theme class
    button.classList.add('theme-' + preference);
    
    // Update accessible label
    const labels = {
      'light': '{{ .Site.Params.darkmode.label_light | default "Light theme" }}',
      'dark': '{{ .Site.Params.darkmode.label_dark | default "Dark theme" }}',
      'auto': '{{ .Site.Params.darkmode.label_auto | default "Auto theme" }}'
    };
    label.textContent = labels[preference] || labels.auto;
    
    // Update title
    button.setAttribute('title', labels[preference] || labels.auto);
  };
  
  // Initialize on page load
  window.addEventListener('DOMContentLoaded', function() {
    const button = document.getElementById('theme-toggle');
    if (button && window.neoTheme) {
      // Set initial state
      const stored = window.neoTheme.getStoredTheme() || window.neoTheme.THEME_AUTO;
      const effective = window.neoTheme.getEffectiveTheme(stored);
      updateThemeToggle(stored, effective);
      
      // Handle clicks
      button.addEventListener('click', function() {
        window.neoTheme.cycleTheme();
      });
    }
  });
</script>
{{- end }}
