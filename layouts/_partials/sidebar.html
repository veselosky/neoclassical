{{- if .Site.Params.sidebar.enabled }}
<aside class="neo-sidebar" role="complementary" aria-label="Sidebar">
  {{- $modules := .Site.Params.sidebar.modules }}
  {{- range $modules }}
    {{- if .enabled }}
      {{- $template := printf "sidebar/%s.html" .name }}
      {{- partial $template $ }}
    {{- end }}
  {{- end }}
</aside>
{{- end }}
