pagination:
  pagerSize: 5

summaryLength: 35

markup:
  goldmark:
    parser:
      attribute:
        block: true
        title: true

taxonomies:
  tag: tags
  category: categories
  series: series

params:
  date_format: "Jan 2, 2006"
  usePagefind: false
  home:
    featured_posts:
      limit: 6
    recent_posts:
      limit: 5
  # Sidebar configuration
  sidebar:
    enabled: true
    modules:
      # - name: search
      #   enabled: true
      - name: recent
        enabled: true
      - name: featured
        enabled: true
      - name: categories
        enabled: true
      - name: tagcloud
        enabled: true
      - name: archive
        enabled: true
      - name: social
        enabled: true
      - name: blogroll
        enabled: true
    
    # Module-specific settings
    # recent_posts:
    #   limit: 5
    # featured_posts:
    #   title: Featured Articles
    #   limit: 3
    # categories:
    #   title: Categories
    # tagcloud:
    #   title: Tag Cloud
    #   min_font_size: 0.85
    #   max_font_size: 1.8
    # search:
    #   title: Search
    # archive:
    #   title: Archive by Date
    # social:
    #   title: Connect
    # blogroll:
    #   title: Space Links
  
  # Social media links
  social:
    rss: /index.xml
  
  # Dark mode configuration
  darkmode:
    enabled: true
    label_light: Light theme
    label_dark: Dark theme
    label_auto: Auto theme
